image:
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

secret:
  create: true
  name: openai-api
  keys:
    openaiApiKey: OPENAI_API_KEY

appConfig:
  fastapi:
    cors:
      allow_origins: []
  host: 0.0.0.0
  port: 8000
  reload: false
  openai_model: gpt-4.1-mini
  openai_embedding_model: text-embedding-3-small
  xagent_max_wait_seconds: 10.0
