{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "langchain-service.fullname" . }}
  labels:
    {{- include "langchain-service.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecret.secretStoreRef.kind | quote }}
    name: {{ required "externalSecret.secretStoreRef.name is required when externalSecret.enabled=true" .Values.externalSecret.secretStoreRef.name | quote }}
  target:
    name: {{ include "langchain-service.secretName" . }}
    creationPolicy: {{ .Values.externalSecret.target.creationPolicy | quote }}
    deletionPolicy: {{ .Values.externalSecret.target.deletionPolicy | quote }}
  data:
    - secretKey: {{ .Values.secret.keys.openaiApiKey | quote }}
      remoteRef:
        key: {{ required "externalSecret.data.openaiApiKey.key is required when externalSecret.enabled=true" .Values.externalSecret.data.openaiApiKey.key | quote }}
        {{- with .Values.externalSecret.data.openaiApiKey.property }}
        property: {{ . | quote }}
        {{- end }}
        {{- with .Values.externalSecret.data.openaiApiKey.version }}
        version: {{ . | quote }}
        {{- end }}
{{- end }}
