apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "langchain-service.fullname" . }}
  labels:
    {{- include "langchain-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "langchain-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "langchain-service.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ include "langchain-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /app/config/config.yaml
          ports:
            - containerPort: {{ .Values.appConfig.port }}
              name: http
          envFrom:
            - secretRef:
                name: {{ include "langchain-service.secretName" . }}
          volumeMounts:
            - name: app-config
              mountPath: /app/config
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: app-config
          configMap:
            name: {{ include "langchain-service.fullname" . }}-config
