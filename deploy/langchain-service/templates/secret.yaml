{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "langchain-service.secretName" . }}
  labels:
    {{- include "langchain-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.keys.openaiApiKey }}: {{ required "secret.openaiApiKey is required when secret.create=true" .Values.secret.openaiApiKey | quote }}
{{- end }}
