apiVersion: apps/v1
kind: Deployment
metadata:
  name: langchain-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langchain-service
  template:
    metadata:
      labels:
        app: langchain-service
    spec:
      containers:
        - name: langchain-service
          image: xagent-langchain-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: langchain-service-config
            - secretRef:
                name: openai-api
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
